<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>效果编辑器</title>
	<link rel="stylesheet" type="text/css" href="css/iview.css">
	<link rel="stylesheet" type="text/css" href="css/mqtt.css">

</head>

<body>
	<div id="app">
		<template>
			<div class="main">
				<div class="page-header">
					<a href="mqtt.html?mode=custom" class="back-btn">← 返回</a>
					<h1 class="page-title">🎬 效果编辑器</h1>
				</div>

				<div class="control-panel">
					<div class="section-title-row">
						<div class="section-title">🎞️ 帧管理</div>
						<div class="section-action">
							<label>🔄 循环: <i-switch v-model="loopEffect" size="small"></i-switch></label>
						</div>
					</div>
					<div class="frame-management">
						<div class="frame-count-badge">{{ frames.length }} 帧</div>
						<div class="frame-list" v-if="frames.length > 0">
							<div v-for="(frame, fIndex) in frames" :key="fIndex" class="frame-card-full"
								:class="{ 'active': currentFrameIndex === fIndex, 'dragging': dragIndex === fIndex }"
								draggable="true" @dragstart="dragStart(fIndex, $event)" @dragend="dragEnd"
								@dragover.prevent="dragOver($event)" @drop="drop(fIndex, $event)"
								@click="selectFrame(fIndex)">
								<span class="frame-delay">{{ frame.delay }}ms</span>
								<div class="frame-leds-row">
									<div v-for="(led, ledIndex) in frame.leds" :key="ledIndex" class="frame-led-mini"
										:style="{ backgroundColor: getLedColor(led) }"
										@click.stop="selectFrameAndLed(fIndex, ledIndex)">
									</div>
								</div>
								<button class="frame-delete-btn" @click.stop="removeFrame(fIndex)">×</button>
							</div>
						</div>
						<div class="frame-empty" v-else>
							<span>📌 暂无帧，点击下方按钮添加</span>
						</div>
						<div class="frame-add-row">
							<button class="add-frame-btn" @click="addFrames">
								<span class="btn-icon">✨</span>
								<span>添加帧</span>
							</button>
						</div>
					</div>

					<div class="section-title">✏️ 编辑帧</div>
					<div class="frame-editor" v-if="currentFrameIndex >= 0">
						<div class="editor-header">
							<span class="editor-badge">帧 {{ currentFrameIndex + 1 }}</span>
							<span v-if="isSystemPreset" class="system-badge">系统预设</span>
						</div>
						<div class="delay-control">
							<label>⏱️ 延迟</label>
							<div class="delay-input">
								<button class="delay-btn"
									@click="frames[currentFrameIndex].delay = Math.max(10, frames[currentFrameIndex].delay - 50)"
									:disabled="isSystemPreset">−</button>
								<span class="delay-value">{{ frames[currentFrameIndex].delay }}</span>
								<button class="delay-btn"
									@click="frames[currentFrameIndex].delay = Math.min(5000, frames[currentFrameIndex].delay + 50)"
									:disabled="isSystemPreset">+</button>
								<span class="delay-unit">ms</span>
							</div>
						</div>
						<div class="led-preview">
							<div v-for="(led, index) in frames[currentFrameIndex].leds" :key="index" class="led-item"
								:style="{ backgroundColor: getLedColor(led) }"
								:class="{ 'selected': selectedLed === index, 'disabled': isSystemPreset }"
								@click="!isSystemPreset && selectLed(index)">
								{{ index }}
							</div>
						</div>
						<div class="led-color-editor" v-if="selectedLed !== null && !isSystemPreset">
							<div class="color-sliders">
								<div class="color-slider-row">
									<span class="color-label r">R</span>
									<input type="range" v-model="ledR" min="0" max="255" class="color-slider red"
										@input="applyLedColorRealtime">
									<span class="color-value">{{ ledR }}</span>
								</div>
								<div class="color-slider-row">
									<span class="color-label g">G</span>
									<input type="range" v-model="ledG" min="0" max="255" class="color-slider green"
										@input="applyLedColorRealtime">
									<span class="color-value">{{ ledG }}</span>
								</div>
								<div class="color-slider-row">
									<span class="color-label b">B</span>
									<input type="range" v-model="ledB" min="0" max="255" class="color-slider blue"
										@input="applyLedColorRealtime">
									<span class="color-value">{{ ledB }}</span>
								</div>
							</div>
							<div class="color-preview-box"
								:style="{ backgroundColor: 'rgb(' + ledR + ',' + ledG + ',' + ledB + ')' }"></div>
							<div class="led-actions">
								<Button type="info" size="small" @click="applyColorToAllLed">📋 全部</Button>
								<Button type="error" size="small" @click="clearCurrentFrameLed">❌ 清除</Button>
							</div>
						</div>
						<div class="led-color-editor" v-else-if="!isSystemPreset">
							<div class="empty-hint">👆 点击上方LED选择要编辑的灯</div>
						</div>
					</div>
					<div class="frame-editor" v-else>
						<div class="empty-hint">📌 请先添加帧，然后选择一帧进行编辑</div>
					</div>

					<div class="section-title">👁️ 效果预览</div>
					<div class="effect-preview" v-if="frames.length > 0">
						<div class="preview-controls">
							<button class="preview-btn play" @click="startPreview" :disabled="isPreviewing">
								▶️ 播放
							</button>
							<button class="preview-btn stop" @click="stopPreview" :disabled="!isPreviewing">
								⏹️ 停止
							</button>
							<span class="preview-info">帧 {{ previewFrameIndex + 1 }} / {{ frames.length }}</span>
						</div>
						<div class="preview-display">
							<div v-for="(led, index) in previewLeds" :key="index" class="led-item preview-led"
								:style="{ backgroundColor: getLedColor(led) }">
								{{ index }}
							</div>
						</div>
					</div>
					<div class="effect-preview" v-else>
						<div class="empty-hint">📌 添加帧后可预览效果</div>
					</div>

					<div class="section-title">💾 保存与发送</div>
					<div class="action-section">
						<div class="total-command" v-if="generatedCommand">
							<div class="command-header">
								<span>总指令</span>
								<span :class="{ 'warning': generatedCommand.length > 1024 }">{{ generatedCommand.length
									}} 字节</span>
							</div>
							<div class="command-content">{{ generatedCommand }}</div>
						</div>
						<div class="action-row">
							<button class="action-btn save" @click="saveEffect" :disabled="frames.length === 0">
								<span class="btn-icon">💾</span>
								<span>保存预设</span>
							</button>
							<button class="action-btn clear" @click="clearAllFrames" :disabled="frames.length === 0">
								<span class="btn-icon">🗑️</span>
								<span>清空帧</span>
							</button>
						</div>
						<button class="send-btn" @click="sendCustomEffect" :disabled="frames.length === 0">
							<span class="btn-icon">📤</span>
							<span>发送到设备</span>
						</button>
					</div>

					<div class="delete-section" v-if="editingIndex !== null">
						<button class="delete-btn" @click="deleteCurrentEffect">
							<span class="btn-icon">🗑️</span>
							<span>删除此预设</span>
						</button>
					</div>
				</div>

				<div class="bottom-status"
					:class="{ 'connected': connectionStatus === 'connected', 'disconnected': connectionStatus === 'disconnected', 'reconnecting': connectionStatus === 'reconnecting' }">
					<span class="status-dot"></span>
					<span>网络连接状态: {{ connectionStatusText }}</span>
				</div>
			</div>
		</template>
	</div>
	<script type="text/javascript" src="js/vue.min.js"></script>
	<script type="text/javascript" src="js/iview.min.js"></script>
	<script src="js/mqtt.js"></script>
	<script>
		const myVue = new Vue({
			el: '#app',
			data: {
				selectedLed: null,
				ledR: 255, ledG: 255, ledB: 255,
				loopEffect: true,
				frames: [],
				currentFrameIndex: -1,
				generatedCommand: '',
				savedEffects: [],
				isPreviewing: false,
				previewFrameIndex: 0,
				previewLeds: [
					{ r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 },
					{ r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 }
				],
				previewTimer: null,
				tempEffectName: '',
				tempEffectIcon: '',
				iconOptions: ['📁', '⭐', '🌟', '💫', '🔥', '❤️', '💜', '💙', '💚', '💛', '🧡', '🌈', '⚡', '✨', '🎯', '🎨'],
				isSystemPreset: false,
				editingIndex: null,
				dragIndex: null,
				client: null,
				options: {
					url: 'ws://broker.emqx.io:8083/mqtt',
					topic: 'connect_all_esp8266_mqtt_led_topic',
					connectTimeout: 10000,
					clientId: 'connect_all_esp8266_mqtt_led_' + new Date().getTime(),
					clean: true,
					keepalive: 60,
					protocolVersion: 4
				},
				connectionStatus: 'disconnected',
				connectionStatusText: '未连接'
			},
			methods: {
				getLedColor(led) {
					if (led.r === 0 && led.g === 0 && led.b === 0) {
						return '#333';
					}
					return 'rgb(' + led.r + ',' + led.g + ',' + led.b + ')';
				},
				getFrameCommand(frame) {
					const arr = [frame.delay];
					frame.leds.forEach((led, i) => {
						if (led.r > 0 || led.g > 0 || led.b > 0) {
							arr.push(i, led.r, led.g, led.b);
						}
					});
					return JSON.stringify(arr);
				},
				selectLed(index) {
					if (this.currentFrameIndex < 0) return;
					this.selectedLed = index;
					const frame = this.frames[this.currentFrameIndex];
					this.ledR = frame.leds[index].r;
					this.ledG = frame.leds[index].g;
					this.ledB = frame.leds[index].b;
				},
				applyLedColorRealtime() {
					if (this.currentFrameIndex < 0 || this.selectedLed === null) return;
					this.$set(this.frames[this.currentFrameIndex].leds, this.selectedLed, {
						r: parseInt(this.ledR),
						g: parseInt(this.ledG),
						b: parseInt(this.ledB)
					});
					this.updateGeneratedCommand();
				},
				applyColorToAllLed() {
					if (this.currentFrameIndex < 0) {
						this.$Message.warning('请先选择一帧');
						return;
					}
					const color = { r: parseInt(this.ledR), g: parseInt(this.ledG), b: parseInt(this.ledB) };
					for (let i = 0; i < 8; i++) {
						this.frames[this.currentFrameIndex].leds[i] = { ...color };
					}
					this.$Message.success('所有LED颜色已设置');
					this.updateGeneratedCommand();
				},
				clearCurrentFrameLed() {
					if (this.currentFrameIndex < 0) return;
					if (this.selectedLed !== null) {
						this.frames[this.currentFrameIndex].leds[this.selectedLed] = { r: 0, g: 0, b: 0 };
						this.ledR = 0; this.ledG = 0; this.ledB = 0;
						this.$Message.success('LED ' + this.selectedLed + ' 已清除');
						this.updateGeneratedCommand();
					}
				},
				clearAllLedsInFrame() {
					if (this.currentFrameIndex < 0) return;
					for (let i = 0; i < 8; i++) {
						this.frames[this.currentFrameIndex].leds[i] = { r: 0, g: 0, b: 0 };
					}
					this.ledR = 0; this.ledG = 0; this.ledB = 0;
					this.$Message.success('所有LED已清除');
					this.updateGeneratedCommand();
				},
				selectFrame(index) {
					this.currentFrameIndex = index;
					this.selectedLed = null;
				},
				selectFrameAndLed(frameIndex, ledIndex) {
					this.currentFrameIndex = frameIndex;
					this.selectedLed = ledIndex;
					const frame = this.frames[frameIndex];
					this.ledR = frame.leds[ledIndex].r;
					this.ledG = frame.leds[ledIndex].g;
					this.ledB = frame.leds[ledIndex].b;
				},
				addFrames() {
					this.frames.push({
						leds: [
							{ r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 },
							{ r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 }, { r: 0, g: 0, b: 0 }
						],
						delay: 200
					});
					if (this.currentFrameIndex < 0) {
						this.currentFrameIndex = 0;
					}
					this.$Message.success('已添加帧');
					this.updateGeneratedCommand();
				},
				removeFrame(index) {
					this.frames.splice(index, 1);
					if (this.currentFrameIndex >= this.frames.length) {
						this.currentFrameIndex = this.frames.length - 1;
					}
					if (this.frames.length === 0) {
						this.currentFrameIndex = -1;
					}
					this.selectedLed = null;
					this.$Message.success('帧已删除');
					this.updateGeneratedCommand();
				},
				clearAllFrames() {
					this.frames = [];
					this.currentFrameIndex = -1;
					this.selectedLed = null;
					this.$Message.success('所有帧已清空');
					this.updateGeneratedCommand();
				},
				saveEffect() {
					if (this.frames.length === 0) return;
					if (this.editingIndex !== null && this.savedEffects[this.editingIndex]) {
						this.tempEffectName = this.savedEffects[this.editingIndex].name;
						this.tempEffectIcon = this.savedEffects[this.editingIndex].icon || '📁';
					} else {
						this.tempEffectName = '';
						this.tempEffectIcon = '📁';
					}
					this.$Modal.confirm({
						title: '保存效果',
						render: (h) => {
							return h('div', [
								h('div', { style: { marginBottom: '10px', color: '#666' } }, '选择图标:'),
								h('div', {
									style: {
										display: 'flex',
										flexWrap: 'wrap',
										gap: '8px',
										marginBottom: '15px'
									}
								}, this.iconOptions.map(icon =>
									h('div', {
										style: {
											width: '36px',
											height: '36px',
											display: 'flex',
											alignItems: 'center',
											justifyContent: 'center',
											fontSize: '20px',
											borderRadius: '8px',
											cursor: 'pointer',
											background: this.tempEffectIcon === icon ? '#1890ff' : 'rgba(0,0,0,0.1)',
											transition: 'all 0.2s'
										},
										on: {
											click: () => {
												this.tempEffectIcon = icon;
											}
										}
									}, icon)
								)),
								h('div', { style: { marginBottom: '10px', color: '#666' } }, '输入名称:'),
								h('Input', {
									props: {
										placeholder: '请输入效果名称',
										autofocus: true,
										value: this.tempEffectName
									},
									on: {
										input: (val) => {
											this.tempEffectName = val;
										}
									}
								})
							]);
						},
						onOk: () => {
							const name = this.tempEffectName || ('效果 ' + (this.savedEffects.length + 1));
							if (this.editingIndex !== null) {
								this.savedEffects[this.editingIndex] = {
									name: name,
									icon: this.tempEffectIcon,
									frames: JSON.parse(JSON.stringify(this.frames)),
									loop: this.loopEffect
								};
								this.$Message.success('预设已更新: ' + name);
							} else {
								this.savedEffects.push({
									name: name,
									icon: this.tempEffectIcon,
									frames: JSON.parse(JSON.stringify(this.frames)),
									loop: this.loopEffect
								});
								this.$Message.success('效果已保存: ' + name);
							}
							this.isSystemPreset = false;
							localStorage.setItem('ws2812_effects', JSON.stringify(this.savedEffects));
							this.tempEffectName = '';
							this.tempEffectIcon = '';
						}
					});
				},
				deleteSavedEffect(index) {
					this.savedEffects.splice(index, 1);
					localStorage.setItem('ws2812_effects', JSON.stringify(this.savedEffects));
					this.$Message.success('效果已删除');
				},
				deleteCurrentEffect() {
					if (this.editingIndex === null) return;
					this.$Modal.confirm({
						title: '确认删除',
						content: '确定要删除此预设吗？',
						onOk: () => {
							this.savedEffects.splice(this.editingIndex, 1);
							localStorage.setItem('ws2812_effects', JSON.stringify(this.savedEffects));
							this.$Message.success('预设已删除');
							window.location.href = 'mqtt.html?mode=custom';
						}
					});
				},
				dragStart(index, event) {
					this.dragIndex = index;
					event.dataTransfer.effectAllowed = 'move';
					event.dataTransfer.setData('text/plain', index);
				},
				dragEnd() {
					this.dragIndex = null;
				},
				dragOver(event) {
					event.dataTransfer.dropEffect = 'move';
				},
				drop(index, event) {
					event.preventDefault();
					if (this.dragIndex !== null && this.dragIndex !== index) {
						const frame = this.frames.splice(this.dragIndex, 1)[0];
						this.frames.splice(index, 0, frame);
						if (this.currentFrameIndex === this.dragIndex) {
							this.currentFrameIndex = index;
						} else if (this.currentFrameIndex > this.dragIndex && this.currentFrameIndex <= index) {
							this.currentFrameIndex--;
						} else if (this.currentFrameIndex < this.dragIndex && this.currentFrameIndex >= index) {
							this.currentFrameIndex++;
						}
						this.updateGeneratedCommand();
						this.$Message.success('帧顺序已调整');
					}
					this.dragIndex = null;
				},
				startPreview() {
					if (this.frames.length === 0) return;
					this.isPreviewing = true;
					this.previewFrameIndex = 0;
					this.runPreview();
				},
				runPreview() {
					if (!this.isPreviewing || this.frames.length === 0) {
						this.stopPreview();
						return;
					}
					const frame = this.frames[this.previewFrameIndex];
					this.previewLeds = JSON.parse(JSON.stringify(frame.leds));
					this.previewFrameIndex = (this.previewFrameIndex + 1) % this.frames.length;
					if (this.previewFrameIndex === 0 && !this.loopEffect) {
						this.stopPreview();
						return;
					}
					this.previewTimer = setTimeout(() => this.runPreview(), frame.delay);
				},
				stopPreview() {
					this.isPreviewing = false;
					if (this.previewTimer) {
						clearTimeout(this.previewTimer);
						this.previewTimer = null;
					}
				},
				updateGeneratedCommand() {
					if (this.frames.length === 0) {
						this.generatedCommand = '';
						return;
					}
					const frames = this.frames.map(f => {
						const arr = [f.delay];
						f.leds.forEach((led, i) => {
							if (led.r > 0 || led.g > 0 || led.b > 0) {
								arr.push(i, led.r, led.g, led.b);
							}
						});
						return arr;
					});
					const effect = { l: this.loopEffect ? 1 : 0, f: frames };
					this.generatedCommand = 'c:' + JSON.stringify(effect);
				},
				sendCustomEffect() {
				if (this.frames.length === 0) {
					this.$Message.error('请先添加帧');
					return;
				}
				this.updateGeneratedCommand();
				if (this.generatedCommand.length > 1024) {
					this.$Modal.warning({
						title: '指令超长警告',
						content: '指令长度 ' + this.generatedCommand.length + ' 字节，超过1024字节限制！请减少帧数或LED数量。',
						okText: '确定'
					});
					return;
				}
				this.sendCommand(this.generatedCommand);
				// 更新当前预设
				const urlParams = new URLSearchParams(window.location.search);
				const preset = urlParams.get('preset');
				if (preset) {
					// 系统预设
					localStorage.setItem('ws2812_current_preset', preset);
				} else if (this.editingIndex !== null && this.savedEffects[this.editingIndex]) {
					// 编辑的用户预设
					localStorage.setItem('ws2812_current_preset', this.savedEffects[this.editingIndex].name);
				} else {
					// 新创建的效果
					localStorage.setItem('ws2812_current_preset', '自定义效果');
				}
			},
				sendCommand(cmd) {
					if (this.client && this.client.connected) {
						let finalCmd = cmd;
						const mqttConfig = localStorage.getItem('ws2812_mqtt_config');
						if (mqttConfig) {
							const config = JSON.parse(mqttConfig);
							if (config.activePlatform === 'bemfa') {
								finalCmd = this.formatBemfaCommand(cmd);
							} else if (config.activePlatform === 'thingscloud') {
								finalCmd = this.formatThingsCloudCommand(cmd);
							}
						}
						this.client.publish(this.options.topic, finalCmd, { qos: 1 });
						this.$Message.success('已发送: ' + (finalCmd.length > 50 ? finalCmd.substring(0, 50) + '...' : finalCmd));
					} else {
						this.$Message.error('MQTT 未连接');
					}
				},
				formatBemfaCommand(cmd) {
					if (cmd === 'on') return 'on';
					if (cmd === 'off') return 'off';
					if (cmd.startsWith('brightness:')) {
						const brightness = cmd.split(':')[1];
						return 'br#' + Math.round(brightness * 2.55);
					}
					if (cmd.startsWith('c:')) {
						try {
							const parsed = JSON.parse(cmd.substring(2));
							if (parsed.f && parsed.f.length > 0) {
								const frame = parsed.f[0];
								if (frame.length > 1) {
									const leds = frame.slice(1);
									if (leds.length > 0 && leds[0].length === 4) {
										const led = leds[0];
										return 'color#' + led[1] + ',' + led[2] + ',' + led[3];
									}
								}
							}
						} catch (e) { }
					}
					return cmd;
				},
				formatThingsCloudCommand(cmd) {
					if (cmd === 'on') {
						return JSON.stringify({
							"power": "on",
							"brightness": 255,
							"color": {
								"r": 255,
								"g": 255,
								"b": 255
							}
						});
					} else if (cmd === 'off') {
						return JSON.stringify({
							"power": "off"
						});
					} else if (cmd.startsWith('brightness:')) {
						const brightness = cmd.split(':')[1];
						return JSON.stringify({
							"brightness": parseInt(brightness)
						});
					} else if (cmd.startsWith('c:')) {
						try {
							const parsed = JSON.parse(cmd.substring(2));
							if (parsed.f && parsed.f.length > 0) {
								const frame = parsed.f[0];
								if (frame.length > 1) {
									const leds = frame.slice(1);
									if (leds.length > 0 && leds[0].length === 4) {
										const led = leds[0];
										return JSON.stringify({
											"power": "on",
											"color": {
												"r": led[1],
												"g": led[2],
												"b": led[3]
											}
										});
									}
								}
							}
						} catch (e) { }
					}
					return cmd;
				},
				loadPreset(type) {
					this.frames = [];
					this.isSystemPreset = true;
					this.$Modal.info({
						title: '系统预设',
						content: '这是系统预设，不可编辑。如需修改，请保存为用户预设后再编辑。',
						okText: '我知道了'
					});
					switch (type) {
						case 'red':
							this.frames.push({ leds: Array(8).fill(null).map(() => ({ r: 255, g: 0, b: 0 })), delay: 0 });
							this.loopEffect = false;
							break;
						case 'green':
							this.frames.push({ leds: Array(8).fill(null).map(() => ({ r: 0, g: 255, b: 0 })), delay: 0 });
							this.loopEffect = false;
							break;
						case 'blue':
							this.frames.push({ leds: Array(8).fill(null).map(() => ({ r: 0, g: 0, b: 255 })), delay: 0 });
							this.loopEffect = false;
							break;
						case 'yellow':
							this.frames.push({ leds: Array(8).fill(null).map(() => ({ r: 255, g: 255, b: 0 })), delay: 0 });
							this.loopEffect = false;
							break;
						case 'purple':
							this.frames.push({ leds: Array(8).fill(null).map(() => ({ r: 128, g: 0, b: 128 })), delay: 0 });
							this.loopEffect = false;
							break;
						case 'cyan':
							this.frames.push({ leds: Array(8).fill(null).map(() => ({ r: 0, g: 255, b: 255 })), delay: 0 });
							this.loopEffect = false;
							break;
						case 'white':
							this.frames.push({ leds: Array(8).fill(null).map(() => ({ r: 255, g: 255, b: 255 })), delay: 0 });
							this.loopEffect = false;
							break;
						case 'rainbow':
							for (let i = 0; i < 8; i++) {
								const leds = Array(8).fill(null).map((_, j) => {
									const hue = ((j + i) * 32) % 256;
									if (hue < 43) return { r: 255, g: hue * 6, b: 0 };
									if (hue < 85) return { r: 255 - (hue - 43) * 6, g: 255, b: 0 };
									if (hue < 128) return { r: 0, g: 255, b: (hue - 85) * 6 };
									if (hue < 170) return { r: 0, g: 255 - (hue - 128) * 6, b: 255 };
									if (hue < 213) return { r: (hue - 170) * 6, g: 0, b: 255 };
									return { r: 255, g: 0, b: 255 - (hue - 213) * 6 };
								});
								this.frames.push({ leds: leds, delay: 100 });
							}
							this.loopEffect = true;
							break;
						case 'running':
							for (let i = 0; i < 8; i++) {
								const leds = Array(8).fill(null).map(() => ({ r: 0, g: 0, b: 0 }));
								leds[i] = { r: 255, g: 255, b: 255 };
								this.frames.push({ leds: leds, delay: 100 });
							}
							this.loopEffect = true;
							break;
						case 'flow':
							for (let i = 0; i < 8; i++) {
								const leds = Array(8).fill(null).map((_, j) => {
									const dist = Math.abs(j - i);
									if (dist === 0) return { r: 255, g: 255, b: 255 };
									if (dist === 1) return { r: 150, g: 150, b: 150 };
									if (dist === 2) return { r: 80, g: 80, b: 80 };
									return { r: 0, g: 0, b: 0 };
								});
								this.frames.push({ leds: leds, delay: 80 });
							}
							this.loopEffect = true;
							break;
						case 'wave':
							for (let i = 0; i < 4; i++) {
								const leds = Array(8).fill(null).map((_, j) => {
									const brightness = (j + i * 2) % 8;
									return { r: 0, g: Math.floor(255 * brightness / 7), b: 255 };
								});
								this.frames.push({ leds: leds, delay: 150 });
							}
							this.loopEffect = true;
							break;
						case 'bounce':
							for (let i = 0; i < 8; i++) {
								const leds = Array(8).fill(null).map(() => ({ r: 0, g: 0, b: 0 }));
								leds[i] = { r: 255, g: 50, b: 50 };
								this.frames.push({ leds: leds, delay: 80 });
							}
							for (let i = 6; i >= 1; i--) {
								const leds = Array(8).fill(null).map(() => ({ r: 0, g: 0, b: 0 }));
								leds[i] = { r: 255, g: 50, b: 50 };
								this.frames.push({ leds: leds, delay: 80 });
							}
							this.loopEffect = true;
							break;
						case 'flash':
							this.frames.push({ leds: Array(8).fill(null).map(() => ({ r: 255, g: 255, b: 255 })), delay: 300 });
							this.frames.push({ leds: Array(8).fill(null).map(() => ({ r: 0, g: 0, b: 0 })), delay: 300 });
							this.loopEffect = true;
							break;
						case 'gradient':
							for (let shift = 0; shift < 4; shift++) {
								const leds = Array(8).fill(null).map((_, i) => {
									const hue = ((i + shift * 2) * 32) % 256;
									if (hue < 43) return { r: 255, g: hue * 6, b: 0 };
									if (hue < 85) return { r: 255 - (hue - 43) * 6, g: 255, b: 0 };
									if (hue < 128) return { r: 0, g: 255, b: (hue - 85) * 6 };
									if (hue < 170) return { r: 0, g: 255 - (hue - 128) * 6, b: 255 };
									if (hue < 213) return { r: (hue - 170) * 6, g: 0, b: 255 };
									return { r: 255, g: 0, b: 255 - (hue - 213) * 6 };
								});
								this.frames.push({ leds: leds, delay: 200 });
							}
							this.loopEffect = true;
							break;
					}
					this.currentFrameIndex = 0;
					this.selectedLed = null;
					this.$Message.success('预设 "' + type + '" 已加载');
					this.updateGeneratedCommand();
					this.startPreview();
				},
				mqttConf() {
					this.client = mqtt.connect(this.options.url, this.options);
					this.client.on('connect', () => {
						myVue.connectionStatus = 'connected';
						myVue.connectionStatusText = '已连接';
						myVue.client.subscribe(myVue.options.topic, (err) => {
							if (!err) console.log('订阅成功:', myVue.options.topic);
						});
					}).on('reconnect', () => {
						myVue.connectionStatus = 'reconnecting';
						myVue.connectionStatusText = '正在重连';
					}).on('error', () => {
						myVue.connectionStatus = 'disconnected';
						myVue.connectionStatusText = '连接失败';
					}).on('end', () => {
						myVue.connectionStatus = 'disconnected';
						myVue.connectionStatusText = '连接断开';
					});
				}
			},
			mounted() {
				// 检查登录状态
				const isLoggedIn = localStorage.getItem('ws2812_logged_in');
				
				// 强制登录，无论是否设置过密码
				if (isLoggedIn !== 'true') {
					// 未登录，跳转到登录页面
					window.location.href = 'login.html';
					return;
				}
				
				const mqttConfig = localStorage.getItem('ws2812_mqtt_config');
				console.log('加载配置:', mqttConfig);
				if (mqttConfig) {
					const config = JSON.parse(mqttConfig);
					console.log('解析后的配置:', config);
					if (config.activePlatform && config[config.activePlatform]) {
						const activeConfig = config[config.activePlatform];
						console.log('激活平台:', config.activePlatform);
						console.log('平台配置:', activeConfig);
						this.options.url = activeConfig.url;
						this.options.topic = activeConfig.topic;
						// 巴法云：使用私钥作为客户端ID时，不需要用户名和密码
						if (config.activePlatform !== 'bemfa') {
							if (activeConfig.username) this.options.username = activeConfig.username;
							if (activeConfig.password) this.options.password = activeConfig.password;
						} else {
							// 巴法云：使用私钥作为客户端ID
							this.options.clientId = activeConfig.password;
							this.options.username = '';
							this.options.password = '';
							console.log('巴法云客户端ID:', this.options.clientId);
						}
					} else {
						console.error('配置格式错误或缺少激活平台');
					}
				} else {
					console.error('未找到保存的配置');
					// 使用默认的巴法云配置进行测试
					this.options.url = 'wss://bemfa.com:9504/wss';
					this.options.topic = 'NV3VbjJLw002';
					this.options.clientId = 'c57619e525344a88a245b13e78aa8a41';
					this.options.username = '';
					this.options.password = '';
					console.log('使用默认巴法云配置进行测试');
				}
				this.mqttConf();
				const saved = localStorage.getItem('ws2812_effects');
				if (saved) {
					this.savedEffects = JSON.parse(saved);
				}
				const urlParams = new URLSearchParams(window.location.search);
				const preset = urlParams.get('preset');
				const editIndex = urlParams.get('edit');
				if (preset) {
					this.loadPreset(preset);
				} else if (editIndex !== null) {
					const editingEffect = localStorage.getItem('ws2812_editing_effect');
					if (editingEffect) {
						const effect = JSON.parse(editingEffect);
						this.frames = JSON.parse(JSON.stringify(effect.frames));
						this.loopEffect = effect.loop;
						this.isSystemPreset = false;
						this.editingIndex = parseInt(editIndex);
						this.currentFrameIndex = 0;
						this.selectedLed = null;
						this.$Message.success('已加载: ' + effect.name);
						this.updateGeneratedCommand();
						this.startPreview();
					}
				} else {
					this.isSystemPreset = false;
				}
			}
		});
	</script>
