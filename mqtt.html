<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ESP8266 MQTT LED Control v1.0.0</title>
	<link rel="stylesheet" type="text/css" href="css/iview.css">
	<link rel="stylesheet" type="text/css" href="css/mqtt.css">
</head>

<body>
	<div id="app">
		<template>
			<div class="main">
				<div class="page-header">
					<div class="header-content">
						<div class="logo">
							<span class="logo-icon">💡</span>
							<span class="logo-text">ESP8266 LED Control</span>
						</div>
						<div class="device-status small">
							<span class="status-label">设备状态:</span>
							<span class="status-value" :class="{ 'online': deviceOnline, 'offline': !deviceOnline }">
								{{ deviceOnline ? '在线' : '离线' }}
							</span>
						</div>
					</div>
					<div class="config-buttons">
						<a href="config.html" class="config-btn">⚙️</a>
						<a href="#" class="config-btn" @click="logout">🚪</a>
					</div>
				</div>

				<div class="mode-tabs">
					<div class="tab-item" :class="{ 'active': controlMode === 'simple' }"
						@click="controlMode = 'simple'">
						<span class="tab-icon">💡</span>
						<span class="tab-text">简单模式</span>
					</div>
					<div class="tab-item" :class="{ 'active': controlMode === 'custom' }"
						@click="controlMode = 'custom'">
						<span class="tab-icon">⚙️</span>
						<span class="tab-text">高级模式</span>
					</div>
				</div>

				<div v-if="controlMode === 'simple'" class="simple-mode">
					<div class="simple-container">
						<div class="lamp-card" :class="{ 'lamp-on': ledDevice.status === 1, 'disabled': !deviceOnline }"
							@click="switchFun" :style="{ cursor: deviceOnline ? 'pointer' : 'not-allowed' }">
							<div class="lamp-glow" v-if="ledDevice.status === 1"></div>
							<div class="lamp-icon">
								<span v-if="ledDevice.status === 1">💡</span>
								<span v-else class="lamp-off-icon">💡</span>
							</div>
							<div class="lamp-status">{{ ledDevice.status === 1 ? '已开启' : '已关闭' }}</div>
						</div>
						<div class="simple-hint" :class="{ 'disabled': !deviceOnline }">{{ deviceOnline ? '点击灯泡开关灯' :
							'设备离线，无法控制' }}</div>
					</div>
				</div>

				<div v-else class="custom-mode">
					<div class="control-panel">
						<div class="section-title">⚡ 开关控制</div>
						<div class="switch-buttons">
							<Button type="success" size="large" @click="sendCommand('on')" :disabled="!deviceOnline">💡
								开灯</Button>
							<Button type="error" size="large" @click="sendCommand('off')" :disabled="!deviceOnline">🌑
								关灯</Button>
						</div>

						<div class="section-title">🔆 亮度调节</div>
						<div class="brightness-control" :class="{ 'disabled': !deviceOnline }">
							<span class="brightness-label">暗</span>
							<input type="range" v-model="brightness" min="0" max="255" @input="sendBrightnessRealtime"
								:disabled="!deviceOnline">
							<span class="brightness-label">亮</span>
							<span class="brightness-value">{{ brightness }}</span>
						</div>

						<div class="section-title">🎨 系统预设</div>
						<div class="preset-section">
							<div class="preset-category">单色</div>
							<div class="preset-grid">
								<Button class="preset-btn color-btn"
									:class="{ 'selected': currentSelectedPreset === 'red' }"
									style="background: #ff4d4f; color: #fff;" @click="sendSystemPreset('red')"
									:disabled="!deviceOnline">🔴
									红色</Button>
								<Button class="preset-btn color-btn"
									:class="{ 'selected': currentSelectedPreset === 'green' }"
									style="background: #52c41a; color: #fff;" @click="sendSystemPreset('green')"
									:disabled="!deviceOnline">🟢
									绿色</Button>
								<Button class="preset-btn color-btn"
									:class="{ 'selected': currentSelectedPreset === 'blue' }"
									style="background: #1890ff; color: #fff;" @click="sendSystemPreset('blue')"
									:disabled="!deviceOnline">🔵
									蓝色</Button>
								<Button class="preset-btn color-btn"
									:class="{ 'selected': currentSelectedPreset === 'yellow' }"
									style="background: #fadb14; color: #333;" @click="sendSystemPreset('yellow')"
									:disabled="!deviceOnline">🟡
									yellow</Button>
								<Button class="preset-btn color-btn"
									:class="{ 'selected': currentSelectedPreset === 'purple' }"
									style="background: #722ed1; color: #fff;" @click="sendSystemPreset('purple')"
									:disabled="!deviceOnline">🟣
									紫色</Button>
								<Button class="preset-btn color-btn"
									:class="{ 'selected': currentSelectedPreset === 'cyan' }"
									style="background: #13c2c2; color: #fff;" @click="sendSystemPreset('cyan')"
									:disabled="!deviceOnline">🔵
									青色</Button>
								<Button class="preset-btn color-btn"
									:class="{ 'selected': currentSelectedPreset === 'white' }"
									style="background: #fff; color: #333; border: 1px solid #ddd;"
									@click="sendSystemPreset('white')" :disabled="!deviceOnline">⚪ 白色</Button>
							</div>
						</div>
						<div class="preset-section">
							<div class="preset-category">动态效果</div>
							<div class="preset-grid">
								<Button class="preset-btn" :class="{ 'selected': currentSelectedPreset === 'rainbow' }"
									type="primary" @click="sendSystemPreset('rainbow')" :disabled="!deviceOnline">🌈
									彩虹</Button>
								<Button class="preset-btn" :class="{ 'selected': currentSelectedPreset === 'running' }"
									type="warning" @click="sendSystemPreset('running')" :disabled="!deviceOnline">🏃
									跑马灯</Button>
								<Button class="preset-btn" :class="{ 'selected': currentSelectedPreset === 'flow' }"
									type="info" @click="sendSystemPreset('flow')" :disabled="!deviceOnline">💧
									流水灯</Button>
								<Button class="preset-btn" :class="{ 'selected': currentSelectedPreset === 'wave' }"
									@click="sendSystemPreset('wave')" :disabled="!deviceOnline">🌊 波浪</Button>
								<Button class="preset-btn" :class="{ 'selected': currentSelectedPreset === 'bounce' }"
									@click="sendSystemPreset('bounce')" :disabled="!deviceOnline">⚡ 弹跳</Button>
								<Button class="preset-btn" :class="{ 'selected': currentSelectedPreset === 'flash' }"
									@click="sendSystemPreset('flash')" :disabled="!deviceOnline">💡 闪烁</Button>
								<Button class="preset-btn" :class="{ 'selected': currentSelectedPreset === 'gradient' }"
									@click="sendSystemPreset('gradient')" :disabled="!deviceOnline">🎨 渐变</Button>
							</div>
						</div>

						<div class="section-title">👤 用户预设</div>
						<div class="preset-section" v-if="savedEffects.length > 0">
							<div class="preset-grid">
								<Button class="preset-btn" v-for="(effect, index) in savedEffects" :key="index"
									@click="editUserPreset(index)" :disabled="!deviceOnline">
									{{ effect.icon || '📁' }} {{ effect.name }}
								</Button>
							</div>
						</div>
						<div class="user-presets-empty" v-else>
							<span>📌 暂无用户预设，点击下方按钮添加</span>
						</div>

						<div class="add-preset-section">
							<button class="add-preset-btn" @click="goToEditor" :disabled="!deviceOnline"
								:style="{ cursor: deviceOnline ? 'pointer' : 'not-allowed', opacity: deviceOnline ? '1' : '0.6' }">
								<span class="btn-icon">✨</span>
								<span>{{ deviceOnline ? '添加用户预设' : '设备离线，无法添加' }}</span>
							</button>
						</div>
					</div>
				</div>


				<div class="bottom-status" :class="connectionStatus">
					<span class="status-dot"></span>
					<span>网络状态：{{ connectionStatusText }}</span>
				</div>
			</div>
		</template>
	</div>
	<script type="text/javascript" src="js/vue.min.js"></script>
	<script type="text/javascript" src="js/iview.min.js"></script>
	<script src="js/mqtt.js"></script>
	<script>
		const myVue = new Vue({
			el: '#app',
			data: {
				controlMode: 'simple',
				ledDevice: {
					descText: '',
					img: ['img/OFF.png', 'img/ON.png'],
					color: ['#E9E9E9', '#19BF6C'],
					descTextStyle: { color: '#E9E9E9' },
					status: 0
				},
				brightness: 50,
				savedEffects: [],
				mqttConfig: null,
				client: null,
				options: {
					url: 'ws://broker.emqx.io:8083/mqtt',
					topic: 'connect_all_esp8266_mqtt_led_topic',
					connectTimeout: 10000,
					clientId: 'connect_all_esp8266_mqtt_led_' + new Date().getTime(),
					clean: true,
					keepalive: 60,
					protocolVersion: 4
				},
				connectionStatus: 'disconnected',
				connectionStatusText: '未连接',
				brightnessTimer: null,
				isLoggedIn: false,
				deviceOnline: false,
				currentPreset: '',
				currentSelectedPreset: '',
				lastDeviceActivity: 0
			},
			methods: {
				switchFun() {
					let status = this.ledDevice.status === 0 ? 1 : 0;
					this.ledDevice.status = status;
					this.ledDevice.descTextStyle = { color: this.ledDevice.color[status] };
					this.sendCommand(status === 1 ? 'on' : 'off');
				},
				sendCommand(cmd) {
					if (this.client && this.client.connected) {
						let finalCmd = cmd;
						if (this.mqttConfig && this.mqttConfig.activePlatform === 'bemfa') {
							finalCmd = this.formatBemfaCommand(cmd);
						}
						this.client.publish(this.options.topic, finalCmd, { qos: 1 });
						this.$Message.success('已发送: ' + (finalCmd.length > 50 ? finalCmd.substring(0, 50) + '...' : finalCmd));
					} else {
						this.$Message.error('MQTT 未连接');
					}
				},
				formatBemfaCommand(cmd) {
					if (cmd === 'on') return 'on';
					if (cmd === 'off') return 'off';
					if (cmd.startsWith('brightness:')) {
						const brightness = cmd.split(':')[1];
						return 'br#' + Math.round(brightness * 2.55);
					}
					if (cmd.startsWith('c:')) {
						try {
							const parsed = JSON.parse(cmd.substring(2));
							if (parsed.f && parsed.f.length > 0) {
								const frame = parsed.f[0];
								if (frame.length > 1) {
									const leds = frame.slice(1);
									if (leds.length > 0 && leds[0].length === 4) {
										const led = leds[0];
										return 'color#' + led[1] + ',' + led[2] + ',' + led[3];
									}
								}
							}
						} catch (e) { }
					}
					return cmd;
				},

				sendBrightnessRealtime() {
					if (this.brightnessTimer) {
						clearTimeout(this.brightnessTimer);
					}
					this.brightnessTimer = setTimeout(() => {
						this.sendCommand('brightness:' + this.brightness);
					}, 100);
				},
				getLedColor(led) {
					if (led.r === 0 && led.g === 0 && led.b === 0) {
						return '#333';
					}
					return 'rgb(' + led.r + ',' + led.g + ',' + led.b + ')';
				},
				sendSystemPreset(type) {
					// 发送预设命令
					if (this.client && this.client.connected) {
						this.client.publish(this.options.topic, 'preset:' + type, { qos: 1 });
						// 更新本地选中状态
						this.currentSelectedPreset = type;
						this.currentPreset = type;
						// 保存到本地存储
						localStorage.setItem('ws2812_current_preset', type);
						this.$Message.success('预设已发送: ' + type);
					} else {
						this.$Message.error('MQTT 未连接');
					}
				},
				sendUserPreset(index) {
					const effect = this.savedEffects[index];
					const frames = effect.frames.map(f => {
						const arr = [f.delay];
						f.leds.forEach((led, i) => {
							if (led.r > 0 || led.g > 0 || led.b > 0) {
								arr.push(i, led.r, led.g, led.b);
							}
						});
						return arr;
					});
					const cmd = 'c:' + JSON.stringify({ l: effect.loop ? 1 : 0, f: frames });
					this.sendCommand(cmd);
					this.currentPreset = effect.name;
					this.$Message.success('用户预设 "' + effect.name + '" 已发送');
				},
				editUserPreset(index) {
					localStorage.setItem('ws2812_editing_effect', JSON.stringify(this.savedEffects[index]));
					window.location.href = 'editor.html?edit=' + index;
				},
				deleteSavedEffect(index) {
					this.savedEffects.splice(index, 1);
					localStorage.setItem('ws2812_effects', JSON.stringify(this.savedEffects));
					this.$Message.success('效果已删除');
				},
				goToEditor() {
					window.location.href = 'editor.html';
				},
				logout() {
					// 清除登录状态
					localStorage.removeItem('ws2812_logged_in');
					// 跳转到登录页面
					window.location.href = 'login.html';
				},
				mqttConf() {
					console.log('MQTT配置:', this.options);
					this.client = mqtt.connect(this.options.url, this.options);
					this.client.on('connect', function () {
						console.log('MQTT连接成功!');
						myVue.$Message.success('MQTT 连接成功!');
						myVue.connectionStatus = 'connected';
						myVue.connectionStatusText = '已连接';
						// 初始状态为离线，只有收到设备回复后才设置为在线
						myVue.deviceOnline = false;
						myVue.lastDeviceActivity = 0;
						myVue.client.subscribe(myVue.options.topic, function (err) {
							if (!err) {
								console.log('订阅成功:', myVue.options.topic);
								// 订阅成功后，发送请求获取当前状态
								myVue.requestCurrentStatus();
							} else {
								console.error('订阅失败:', err);
							}
						});
					}).on('reconnect', function () {
						console.log('MQTT正在重连...');
						myVue.connectionStatus = 'reconnecting';
						myVue.connectionStatusText = '正在重连';
						myVue.deviceOnline = false;
					}).on('error', function (err) {
						console.error('MQTT连接失败:', err);
						myVue.$Message.error('MQTT 连接失败: ' + err.message);
						myVue.connectionStatus = 'disconnected';
						myVue.connectionStatusText = '连接失败';
						myVue.deviceOnline = false;
					}).on('end', function () {
						console.log('MQTT连接断开');
						myVue.connectionStatus = 'disconnected';
						myVue.connectionStatusText = '连接断开';
						myVue.deviceOnline = false;
					}).on('message', function (topic, message) {
						const msg = message.toString();
						console.log('收到消息:', topic, msg);
						// 检查是否是状态查询请求的回声
						if (msg === 'status:web') {
							// 忽略状态查询请求的回声
							console.log('忽略状态查询请求的回声');
							return;
						}
						// 只有收到设备消息后才设置为在线
						myVue.lastDeviceActivity = Date.now();
						myVue.deviceOnline = true;
						if (msg === 'on') {
							myVue.ledDevice.status = 1;
							myVue.ledDevice.descTextStyle = { color: myVue.ledDevice.color[1] };
							myVue.currentPreset = '单色';
						} else if (msg === 'off') {
							myVue.ledDevice.status = 0;
							myVue.ledDevice.descTextStyle = { color: myVue.ledDevice.color[0] };
							myVue.currentPreset = '';
						} else if (msg.startsWith('c:')) {
							// 自定义效果
							myVue.currentPreset = '自定义效果';
						} else if (msg.startsWith('status:')) {
							// 处理设备状态回复
							const statusData = msg.substring(7);
							console.log('收到状态回复数据:', statusData);
							try {
								// 尝试解析JSON
								const statusObj = JSON.parse(statusData);
								console.log('解析后的状态对象:', statusObj);
								// 检查状态对象是否包含必要的字段
								if (statusObj.status !== undefined) {
									// 更新设备状态
									myVue.ledDevice.status = statusObj.status;
									myVue.ledDevice.descTextStyle = { color: myVue.ledDevice.color[statusObj.status] };
									// 更新当前预设
									myVue.currentPreset = statusObj.preset || '';
									// 更新选中的预设
									myVue.currentSelectedPreset = statusObj.preset || '';
									// 保存当前预设到本地存储
									localStorage.setItem('ws2812_current_preset', myVue.currentPreset);
									console.log('设备状态已更新:', statusObj);
									myVue.$Message.success('设备状态已同步');
								} else {
									console.error('状态对象缺少必要字段:', statusObj);
									myVue.$Message.error('设备状态格式错误');
								}
							} catch (e) {
								console.error('解析状态消息失败:', e);
								console.error('原始状态数据:', statusData);
								// 尝试手动解析状态数据
								try {
									// 简单的错误处理：如果解析失败，尝试直接设置状态
									myVue.ledDevice.status = 0;
									myVue.ledDevice.descTextStyle = { color: myVue.ledDevice.color[0] };
									myVue.currentPreset = '';
									myVue.currentSelectedPreset = '';
									console.log('手动设置设备状态为默认值');
									myVue.$Message.success('设备状态已同步（默认值）');
								} catch (e2) {
									console.error('手动设置状态失败:', e2);
								}
							}
						}
					});

					// 检测设备在线状态的定时器
					setInterval(() => {
						if (myVue.lastDeviceActivity > 0 && Date.now() - myVue.lastDeviceActivity > 30000) {
							// 30秒没有收到消息，设备离线
							if (myVue.deviceOnline) {
								myVue.deviceOnline = false;
								// 当设备离线时，重置状态显示
								console.log('设备离线，重置状态显示');
								myVue.$Message.warning('设备已离线');
							}
						}
					}, 5000);

					// 定期发送状态查询请求（用于测试）
					setInterval(() => {
						if (myVue.client && myVue.client.connected) {
							console.log('定期发送状态查询请求');
							myVue.requestCurrentStatus();
						}
					}, 10000);
				},
				requestCurrentStatus() {
					// 发送请求获取当前状态
					// 发送带标识的状态查询命令，区分是网页发送的请求
					if (this.client && this.client.connected) {
						// 发送状态查询命令，添加web标识
						this.client.publish(this.options.topic, 'status:web', { qos: 1 });
						console.log('已发送状态查询请求');
					}
				},
			},
			mounted() {
				// 检查登录状态
				const isLoggedIn = localStorage.getItem('ws2812_logged_in');

				// 强制登录，无论是否设置过密码
				if (isLoggedIn !== 'true') {
					// 未登录，跳转到登录页面
					window.location.href = 'login.html';
					return;
				}

				this.isLoggedIn = true;

				// 加载当前预设
				const currentPreset = localStorage.getItem('ws2812_current_preset');
				if (currentPreset) {
					this.currentPreset = currentPreset;
				}

				const saved = localStorage.getItem('ws2812_effects');
				if (saved) {
					this.savedEffects = JSON.parse(saved);
				}
				const mqttConfig = localStorage.getItem('ws2812_mqtt_config');
				console.log('加载配置:', mqttConfig);
				if (mqttConfig) {
					this.mqttConfig = JSON.parse(mqttConfig);
					console.log('解析后的配置:', this.mqttConfig);
					if (this.mqttConfig.activePlatform && this.mqttConfig[this.mqttConfig.activePlatform]) {
						const activeConfig = this.mqttConfig[this.mqttConfig.activePlatform];
						console.log('激活平台:', this.mqttConfig.activePlatform);
						console.log('平台配置:', activeConfig);
						this.options.topic = activeConfig.topic;
						// 处理不同平台的连接参数
						if (this.mqttConfig.activePlatform === 'bemfa') {
							// 巴法云：使用私钥作为客户端ID
							// 构建正确的WebSocket URL
							let cleanUrl = activeConfig.url.trim();
							cleanUrl = cleanUrl.replace(/^\w+:\/\//, '');
							cleanUrl = cleanUrl.split(':')[0];
							this.options.url = 'wss://' + cleanUrl + ':9504/wss';
							this.options.clientId = activeConfig.password;
							this.options.username = '';
							this.options.password = '';
							// 确保使用 MQTT 3.1.1 协议
							this.options.protocolVersion = 4;
							console.log('巴法云连接URL:', this.options.url);
							console.log('巴法云客户端ID:', this.options.clientId);
						} else {
							// 其他平台：使用配置的完整URL
							this.options.url = activeConfig.url;
							if (activeConfig.username) this.options.username = activeConfig.username;
							if (activeConfig.password) this.options.password = activeConfig.password;
							// 确保使用 MQTT 3.1.1 协议
							this.options.protocolVersion = 4;
							console.log('连接URL:', this.options.url);
							console.log('MQTT协议版本:', this.options.protocolVersion);
						}
						this.mqttConf();
					} else {
						console.error('配置格式错误或缺少激活平台');
						this.connectionStatus = 'disconnected';
						this.connectionStatusText = '配置错误';
						this.$Message.error('MQTT配置格式错误，请重新配置');
					}
				} else {
					console.error('未找到保存的配置');
					// 当没有保存的配置时，不自动连接
					this.connectionStatus = 'disconnected';
					this.connectionStatusText = '未配置';
					this.$Message.warning('请先配置MQTT连接参数');
				}
				const urlParams = new URLSearchParams(window.location.search);
				const mode = urlParams.get('mode');
				if (mode === 'custom') {
					this.controlMode = 'custom';
				}
			}
		});
	</script>
</body>

</html>
